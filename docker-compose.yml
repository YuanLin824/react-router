# 默认自动读取 .env 中的环境变量
# 手动指定环境变量: docker compose -f docker-compose.yml --env-file .env up -d

name: react_router

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_react_router
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_APP_USERNAME: ${POSTGRES_USERNAME:-react_router}
      POSTGRES_APP_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_APP_DATABASE: ${POSTGRES_DATABASE:-react_router_db}
    volumes:
      # - postgres_data:/var/lib/postgresql # 镜像为 postgres:18-alpine 使用
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres.sh:/docker-entrypoint-initdb.d/postgres.sh:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis_react_router
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
      REDIS_APP_USERNAME: ${REDIS_USERNAME:-react_router}
      REDIS_APP_PASSWORD: ${REDIS_PASSWORD:-redis123}
      REDIS_APP_KEY_PREFIX: ${REDIS_KEY_PREFIX:-react_router:}
    volumes:
      - redis_data:/data
      - ./docker/redis.sh:/etc/redis/redis.sh:ro
    entrypoint: ["/bin/sh", "/etc/redis/redis.sh"]
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
